name: Test and Build

on:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Verify no git changes after build
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Build produced uncommitted changes:"
            git status --short
            git --no-pager diff
            exit 1
          fi
